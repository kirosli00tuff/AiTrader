# Per-model token prices (USD per 1M tokens) and assumed tokens per council
# call. Read by api_server/providers_cost.py only (PyYAML). Update freely, no
# code change needed. These drive the LOCAL ESTIMATED provider spend, which is
# always shown and clearly labeled estimated. Not parsed by the C++ engine.
est_input_tokens: 900
est_output_tokens: 400
models:
  gpt-5.5: {input: 5.0, output: 15.0}
  claude-opus-4-8: {input: 15.0, output: 75.0}
  claude-haiku-4-5: {input: 0.8, output: 4.0}
  gemini-3.1-pro: {input: 3.5, output: 10.5}
