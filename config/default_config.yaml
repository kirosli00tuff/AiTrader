# =============================================================================
# Market AI Lab — Default Configuration (SAFE DEFAULTS)
# =============================================================================
# Conservative starting values for the initial phase. Every value is exposed in
# config + UI. Live trading is DISABLED BY DEFAULT and gated behind an explicit
# in-app approval workflow. The static safety layer (Layer 1) treats the
# `risk:` block as HARD limits that adaptive logic may NEVER weaken.
# =============================================================================

system:
  starting_paper_balance: 100000
  default_mode_per_venue: paper          # disabled | recommendation_only | paper | live
  live_mode_default_enabled: false       # live is OFF by default, everywhere
  kill_switch_enabled: true
  manual_resume_required_after_kill_switch: true

# -----------------------------------------------------------------------------
# Engine — continuous (24/7) run-forever loop. Used with `--continuous`.
# The finite `--iterations` path (the offline demo) ignores these.
# -----------------------------------------------------------------------------
engine:
  loop_interval_seconds: 15              # wall-clock seconds between ticks
  respect_market_hours: true            # skip equity ticks when US RTH is closed
                                        # (crypto + prediction markets stay 24/7)
  equities_market_hours_only: true      # council cost cut: US equities (SPY, QQQ)
                                        # skip the base-check gate + council outside
                                        # regular US trading hours; crypto stays
                                        # 24/7. Skips logged as `market_hours`.

# -----------------------------------------------------------------------------
# Market data — where price snapshots come from.
#   mock   = deterministic offline feed (no keys, default)
#   alpaca = real-time Alpaca market-data API (paper/data key; works in Canada)
# If 'alpaca' is selected but no key is resolvable / the fetch fails, the engine
# automatically falls back to the mock feed and logs a clear notice.
# -----------------------------------------------------------------------------
market_data:
  source: mock                          # mock | alpaca
  data_staleness_seconds: 60            # Level-1: reject price snapshots older than this

# -----------------------------------------------------------------------------
# Venues — each supports: disabled | recommendation_only | paper | live
# Live defaults to disabled. Paper/recommendation_only only, out of the box.
# -----------------------------------------------------------------------------
venues:
  # Alpaca handles all paper trading and paper market data. It has NO live path
  # and must never be wired to one. It is the primary online loop (feed_mode
  # alpaca_paper).
  alpaca:
    mode: paper                            # primary continuous testing/training venue
    live_enabled: false                    # Alpaca has no live path; stays false
    paper_adapter: alpaca_paper            # Alpaca paper API (stocks + crypto)
    live_adapter: none                     # NO live path for Alpaca, ever
    institutional_context: sec_api_13f     # delayed disclosure context, NOT live flow
    paper_execution: auto                  # api | sim_live_price | auto
                                           # auto: use Alpaca paper API, else
                                           # fall back to a simulated fill at the
                                           # live market price (e.g. if Alpaca
                                           # paper is geo-blocked / unreachable).
  coinbase:                                # replaces Binance (not available in Canada)
    mode: paper                            # simulated/paper only
    live_enabled: false
    paper_adapter: coinbase_sim
    live_adapter: coinbase_live            # reserved; live adapter not implemented
    whale_source: whale_alert_api
  # IBKR handles live trading only. It routes through the gated Live branch and
  # stays disabled behind the approval gate. See the ibkr block below for the IB
  # Gateway connection settings.
  ibkr:
    mode: recommendation_only              # no orders placed; live stays gated off
    live_enabled: false                    # gated off; operator flips live, not this app
    live_adapter: ibkr_live                # live-only venue
    institutional_context: sec_api_13f

# -----------------------------------------------------------------------------
# Layer 1 — STATIC SAFETY (HARD LIMITS). Adaptive logic may NOT weaken these.
# -----------------------------------------------------------------------------
risk:
  max_daily_loss_total_pct: 0.03
  max_daily_loss_per_venue_pct: 0.02
  max_trade_risk_pct_of_equity: 0.005
  max_total_open_risk_pct: 0.03
  max_open_positions_total: 5
  max_open_positions_per_venue: 2
  max_exposure_per_symbol_pct: 0.02
  max_exposure_per_market_pct: 0.02
  max_exposure_per_category_pct: 0.05
  max_consecutive_losses: 3
  cooldown_minutes_after_loss_breach: 240   # Level-1 (longer/tighter than prior 120)
  min_confidence_default: 0.65              # gate threshold; council has its own (see council:)
  min_edge_default: 0.02
  required_model_agreement_count: 2
  stale_signal_reject_minutes: 1            # Level-1 (~60s; tighter than prior 10)
  max_trades_per_day: 10                    # Level-1 ceiling, enforced in the run loop
  max_trade_notional_cap_pct: 0.05          # Level-1 notional ceiling; the 0.005 per-trade
                                            # risk cap above stays the binding, tighter limit
  kill_switch_enabled: true
  hard_stop_live_if_loss_breach: true
  manual_resume_required_after_kill_switch: true

# -----------------------------------------------------------------------------
# Sizing — fixed-fractional default
# -----------------------------------------------------------------------------
sizing:
  default_position_sizing_method: fixed_fractional
  default_risk_per_trade_pct: 0.005
  default_position_scale_cap: 1.0
  dnn_position_scale_cap: 0.5
  whale_position_scale_cap: 0.35

# -----------------------------------------------------------------------------
# Native strategy layer — two signal factors + a regime detector, evaluated
# ONLY on CLOSED bars (never per tick). Entries set native ATR stop / target /
# time-stop at order creation; exits run natively without the council.
#   whitelist is a comma-separated scalar (the minimal YAML parser has no lists).
# -----------------------------------------------------------------------------
strategy:
  momentum_enabled: true
  reversion_enabled: true
  # Strategy A — trend / momentum
  ema_fast: 20
  ema_slow: 100
  adx_min: 20.0
  atr_period: 14
  atr_vol_floor: 0.0
  # Strategy B — mean reversion (whitelisted symbols only)
  bb_period: 20
  bb_std: 2.0
  rsi_period: 14
  rsi_oversold: 30.0
  rsi_overbought: 70.0
  vol_lookback: 20
  vol_multiple: 1.0                       # reversion needs volume > vol_multiple * avg
  # Regime detector (ADX + realized volatility)
  regime_adx_trend: 25.0
  regime_rvol_high: 0.02
  # Direction policy (equities long-only in paper; crypto short behind this flag)
  crypto_allow_short: false
  # Native exits
  atr_stop_mult: 2.0
  atr_target_mult: 3.0
  time_stop_bars: 24
  # Regime -> (momentum, reversion) blend weights
  trending_momentum_weight: 0.70
  trending_reversion_weight: 0.30
  range_momentum_weight: 0.30
  range_reversion_weight: 0.70
  neutral_momentum_weight: 0.50
  neutral_reversion_weight: 0.50
  bar_timeframe: 5min
  whitelist: "BTC/USD,ETH/USD,SPY,QQQ"

# -----------------------------------------------------------------------------
# Council cost controls — the full LLM council runs ONLY on a native strategy
# entry candidate that passes the base-check gate; never on a timer, tick, or exit.
# council_min_confidence / council_min_agreement are SEPARATE from the Layer-1
# gate thresholds (risk.min_confidence_default / required_model_agreement_count)
# so they can never weaken the deterministic gate.
# -----------------------------------------------------------------------------
council:
  council_daily_budget: 30
  per_symbol_council_cooldown_minutes: 60
  council_max_tokens: 400
  council_min_confidence: 0.6
  council_min_agreement: 2
  neutral_skip_strength_threshold: 0.5

# -----------------------------------------------------------------------------
# RL advisory (Layer 3, DEFERRED). Ships toggled OFF. While rl_enabled is false
# the engine never scores an RL factor and it stays out of the ensemble entirely.
# The PPO trainer (rl_advisory/) refuses to run until at least rl_min_real_fills
# REAL closed fills exist — there is NO synthetic-data training path for RL.
# Advisory only: the 0.5 sizing cap (sizing.dnn_position_scale_cap) applies, and
# RL can never be a sole execution controller. Promotion stays gated + manual.
# -----------------------------------------------------------------------------
rl:
  rl_enabled: false                      # OFF by default (ships toggled off)
  rl_min_real_fills: 500                 # training gate: real closed fills required

# -----------------------------------------------------------------------------
# Offline simulation (how the OFFLINE loop is DRIVEN — never affects live).
# The offline paper loop is the continuous training environment; these controls
# let it generate real native fills that feed the real-fill tuner, train_real,
# and (once enabled + past its gate) RL. NOTE: Alpaca is a PAPER + MARKET-DATA
# venue only. It has no live brokerage path and must never be wired to one.
#   feed_mode  : alpaca_paper (primary ONLINE loop) | flat_random_walk (default) |
#                synthetic_regimes | replay
#     - alpaca_paper: the primary online loop. Pulls live market data from Alpaca
#       and routes paper orders to Alpaca paper (needs --bridge). Alpaca is paper
#       and market data only, with no live path.
#     - synthetic_regimes: TEST tool. Deterministic trending/range/volatile legs
#       that cross the ADX + realized-vol thresholds so momentum AND reversion
#       enter. For tests and threshold tuning.
#     - replay: TEST tool. Drives the loop from real bars already in the 'bars'
#       table (run the Alpaca historical backfill first). Fails loudly if the
#       range is empty.
#     - flat_random_walk: retained for existing tests. Default so tests do not shift.
#   clock_mode : real (wall-clock; online Alpaca loop + continuous mode) | simulated
#     (bar time advances internally so finite/synthetic runs actually close bars).
# -----------------------------------------------------------------------------
simulation:
  feed_mode: flat_random_walk
  clock_mode: real
  synthetic_seed: 42
  replay_start_date: ""                  # inclusive YYYY-MM-DD ("" = earliest stored)
  replay_end_date: ""                    # inclusive YYYY-MM-DD ("" = latest stored)
  replay_speed: fast                     # fast (ignore wall-clock) | realtime

# -----------------------------------------------------------------------------
# IBKR live venue. IBKR handles live trading only. It connects to a locally run
# IB Gateway session that the operator starts and authenticates. No IBKR
# credentials pass through this app. IBKR stays disabled behind the approval
# gate. connection_enabled only allows a health check and, when the operator
# later opens the live gate, live routing. It does NOT enable live trading by
# itself. Default false.
# -----------------------------------------------------------------------------
ibkr:
  gateway_host: 127.0.0.1
  gateway_port: 4001                     # IB Gateway live socket (4002 = paper GW)
  connection_enabled: false              # health check + future live routing; OFF
  market_data: false                     # use Alpaca for market data; IBKR data off

# -----------------------------------------------------------------------------
# Adaptive learning (Layer 2) — bounded, logged, rollback-capable
# -----------------------------------------------------------------------------
adaptive:
  adaptive_learning_enabled: true
  adaptive_weight_updates_enabled: true
  manual_weight_override_priority: true        # manual weights win over adaptive
  adaptive_threshold_update_frequency_trades: 25
  dnn_retrain_frequency_trades: 50
  dnn_challenger_evaluation_window_trades: 100
  dnn_auto_promote_if_better: false            # promotion is a manual/gated action
  rollback_on_metric_degradation: true

# -----------------------------------------------------------------------------
# Whale / smart-money (Layer 4)
# -----------------------------------------------------------------------------
whale:
  whale_tracking_enabled: true
  whale_signal_weight: 0.10
  whale_min_activity_score: 0.60
  whale_min_historical_usefulness: 0.55
  whale_max_signal_age_minutes: 15
  whale_contradiction_penalty_enabled: true
  whale_auto_disable_if_unhelpful: true

# -----------------------------------------------------------------------------
# Live approval gate — ALL must hold before live can be enabled in-app
# -----------------------------------------------------------------------------
live_approval:
  live_approval_required: true
  live_requires_connected_credentials: true
  live_requires_kill_switch_configured: true
  live_requires_recent_performance_visible: true
  live_requires_manual_confirmation: true
  live_requires_positive_paper_expectancy: true
  live_requires_drawdown_below_pct: 0.05

# -----------------------------------------------------------------------------
# Dashboard
# -----------------------------------------------------------------------------
dashboard:
  dashboard_refresh_seconds: 5
  trade_feed_page_size: 50
  equity_curve_default_window_days: 30
  pnl_chart_default_window_days: 7
  show_model_verdict_board_by_default: true
  show_weight_control_panel_by_default: true
  show_dnn_panel_by_default: true
  show_whale_panel_by_default: true

# -----------------------------------------------------------------------------
# Model-weight defaults (ensemble). Editable in UI, auto-normalized,
# resettable to defaults, lockable against adaptive change.
# -----------------------------------------------------------------------------
model_weights:
  llm_primary_weight: 0.27
  llm_secondary_weight: 0.18
  llm_tertiary_weight: 0.12
  rule_based_factor_weight: 0.18
  dnn_advisory_factor_weight: 0.15
  whale_signal_factor_weight: 0.10
  # sum = 1.00 (the six factors above)
  rl_advisory_factor_weight: 0.0         # deferred RL factor; 0.0 = non-decisive
                                         # even once rl_enabled — operator-tunable
                                         # in the UI; excluded from normalization
                                         # while zero, so the sum stays 1.00.

# -----------------------------------------------------------------------------
# LLM advisory model identities — the concrete model each ensemble slot uses.
# This is the single source of truth for the model names; the consensus engine
# and the dashboard's advisory panels both read these strings, so the UI always
# shows the exact model in use and stays accurate when you swap a model here.
# `llm_gate` is the cheap model used for the pre-council base-check.
# These are the only approved model strings (see CLAUDE.md); do not invent others.
# -----------------------------------------------------------------------------
llm_models:
  llm_primary: gpt-5.5              # OpenAI    (env OPENAI_API_KEY)
  llm_secondary: claude-opus-4-8   # Anthropic (env ANTHROPIC_API_KEY)
  llm_tertiary: gemini-3.1-pro     # Google    (env GEMINI_API_KEY)
  llm_gate: claude-haiku-4-5       # base-check gate via the Anthropic client (env ANTHROPIC_API_KEY)

# -----------------------------------------------------------------------------
# LLM council (Layer 2 advisory) — real multi-provider consensus.
#
#   use_real_council: when TRUE *and* the engine is launched with --bridge, the
#     llm_ ensemble factors are scored by the REAL council (OpenAI / Anthropic /
#     Google) instead of the in-process C++ mock. Default FALSE so the offline
#     paper loop stays deterministic and key-free. Any provider whose API key
#     env var is absent returns a clearly-labelled MOCK verdict (never crashes),
#     so turning this on never forces the system offline.
#   gate_enabled: run the cheap Claude Haiku base-check before the three
#     expensive providers. If the gate says "not worth a full review" the council
#     is skipped and a flat/neutral verdict is returned (cost control). Default
#     TRUE. The gate reuses the council's ANTHROPIC_API_KEY (no new credential);
#     without it the gate runs in permissive mock mode (always proceeds) so
#     offline behaviour is unchanged.
# -----------------------------------------------------------------------------
llm:
  use_real_council: false
  gate_enabled: true

# -----------------------------------------------------------------------------
# External data sources (set credentials on the in-app Accounts/Connections
# page or via environment variables — see .env.example). Keys are NEVER stored
# in this file.
# -----------------------------------------------------------------------------
data_sources:
  whale_alert:
    enabled: true
    base_url: "https://api.whale-alert.io/v1"
    min_value_usd: 500000
    api_key_env: WHALE_ALERT_API_KEY
  sec_api_13f:
    enabled: true
    base_url: "https://api.sec-api.io"
    endpoint: "/form-13f/holdings"
    note: "DELAYED institutional holdings disclosure — NOT live trade flow."
    api_key_env: SEC_API_KEY
